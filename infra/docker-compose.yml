version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: speeky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: speeky
      POSTGRES_USER: speeky
      POSTGRES_PASSWORD: speeky_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: speeky-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: speeky-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: speeky
      MINIO_ROOT_PASSWORD: speeky_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  coturn:
    image: coturn/coturn:latest
    container_name: speeky-coturn
    restart: unless-stopped
    network_mode: host
    command: >
      -n
      --log-file=stdout
      --listening-port=3478
      --min-port=49160
      --max-port=49200
      --fingerprint
      --realm=speeky.local
      --lt-cred-mech
      --user=speeky:turn_password

volumes:
  postgres_data:
  minio_data:
